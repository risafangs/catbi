name: Run Cat Events dlt Pipeline

on:
  schedule:
    - cron: '0 23 * * *'  # Daily
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-dlt-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create secrets directory
        run: |
          mkdir -p .dlt/secrets
      
      - name: Write Google Sheets credentials to file
        run: |
          echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}' > .dlt/secrets/google_sheets_credentials.json
      
      - name: Write MotherDuck token to file
        run: |
          echo '${{ secrets.MOTHERDUCK_SERVICE_TOKEN }}' > .dlt/secrets/motherduck_token.txt
      
      - name: Create TOML configuration
        run: |
          cat << 'EOF' > .dlt/secrets.toml
          [sources.google_sheets]
          credentials_json_path = ".dlt/secrets/google_sheets_credentials.json"

          [destination.motherduck.credentials]
          database = "my_db"
          password_file = ".dlt/secrets/motherduck_token.txt"
          EOF
      
      - name: Validate credentials file
        run: |
          python3 -c "import json; data=json.load(open('.dlt/secrets/google_sheets_credentials.json')); print('✅ Valid JSON:', data.get('type', 'unknown'))"
      
      - name: Run dlt pipeline
        run: python mei_vomit_input_pipeline.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            .dlt/pipelines/*/logs/
          retention-days: 3
