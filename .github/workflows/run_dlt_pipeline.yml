name: Run Cat Events dlt Pipeline

on:
  schedule:
    - cron: '0 23 * * *'  # Daily
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-dlt-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create secrets.toml
        run: |
          mkdir -p .dlt
          echo '[sources.google_sheets]' > .dlt/secrets.toml
          echo 'credentials_json = "${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}"' >> .dlt/secrets.toml
          echo '' >> .dlt/secrets.toml
          echo '[destination.motherduck.credentials]' >> .dlt/secrets.toml
          echo 'database = "my_db"' >> .dlt/secrets.toml
          echo 'password = "${{ secrets.MOTHERDUCK_SERVICE_TOKEN }}"' >> .dlt/secrets.toml
      
      - name: Run dlt pipeline
        run: python mei_vomit_input_pipeline.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            .dlt/pipelines/*/logs/
          retention-days: 3
