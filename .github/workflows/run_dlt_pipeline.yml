name: Run Cat Events dlt Pipeline

on:
  schedule:
    - cron: '0 23 * * *'  # Daily
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-dlt-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create secrets directory
        run: |
          mkdir -p .dlt/secrets
      
      - name: Write MotherDuck token to file
        run: |
          echo '${{ secrets.MOTHERDUCK_SERVICE_TOKEN }}' > .dlt/secrets/motherduck_token.txt
      
      - name: Create TOML configuration
        run: |
          # Process the Google Sheets credentials and create secrets.toml
          python3 << 'EOF'
          import json
          import os
          
          # Get the secret from environment
          creds_json = os.environ.get('GOOGLE_SHEETS_CREDENTIALS_JSON', '')
          
          if not creds_json:
              print("❌ ERROR: GOOGLE_SHEETS_CREDENTIALS_JSON is not set")
              exit(1)
          
          # Convert literal \n to actual newlines
          creds_json = creds_json.replace('\\n', '\n')
          
          # Parse the JSON
          try:
              creds = json.loads(creds_json)
          except json.JSONDecodeError as e:
              print(f"❌ ERROR: Failed to parse JSON: {e}")
              print(f"JSON content (first 200 chars): {creds_json[:200]}")
              exit(1)
          
          # Write secrets.toml
          with open('.dlt/secrets.toml', 'w') as f:
              f.write('[sources.google_sheets.google_spreadsheet.credentials]\n')
              f.write(f'project_id = "{creds["project_id"]}"\n')
              f.write(f'client_email = "{creds["client_email"]}"\n')
              f.write(f'private_key = """{creds["private_key"]}"""\n')
              f.write('\n')
              f.write('[destination.motherduck.credentials]\n')
              f.write('database = "my_db"\n')
              f.write('password_file = ".dlt/secrets/motherduck_token.txt"\n')
          
          print("✅ secrets.toml created successfully")
          print(f"Project ID: {creds['project_id']}")
          print(f"Client email: {creds['client_email']}")
          EOF
        env:
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
      
      - name: Run dlt pipeline
        run: python mei_vomit_input_pipeline.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            .dlt/pipelines/*/logs/
          retention-days: 3
