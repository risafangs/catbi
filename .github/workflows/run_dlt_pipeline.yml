name: Run Cat Events dlt Pipeline

on:
  schedule:
    - cron: '0 23 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-dlt-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure dlt credentials for MotherDuck
        run: |
          # Create .dlt directory
          mkdir -p .dlt
          
          # Copy safe config.toml from repo
          cp .dlt/config.toml .dlt/config.toml
          
          # Create secrets.toml from GitHub secrets
          cat > .dlt/secrets.toml < EOF
         < [sources.google_sheets]
          credentials_json = "${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}"
          
          [destination.motherduck.credentials]
          database = "my_db"
          password = "${{ secrets.MOTHERDUCK_SERVICE_TOKEN }}"
          EOF
      
      - name: Verify MotherDuck connection
        run: |
          # Test the connection before running pipeline
          python -c "
          import duckdb
          import os
          
          # Read credentials from secrets.toml
          with open('.dlt/secrets.toml', 'r') as f:
              secrets = f.read()
          
          # Extract database and token
          import re
          database_match = re.search(r'database = \"([^\"]+)\"', secrets)
          password_match = re.search(r'password = \"([^\"]+)\"', secrets)
          
          if database_match and password_match:
              database = database_match.group(1)
              token = password_match.group(1)
              
              # Test connection
              conn = duckdb.connect(f'md:{database}?motherduck_token={token}')
              result = conn.execute('SELECT 1').fetchone()
              print('✅ MotherDuck connection successful')
              conn.close()
          else:
              print('❌ Could not parse credentials')
              exit(1)
          "
      
      - name: Run dlt pipeline
        run: python cat_events_pipeline.py
      
      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: motherduck-data-${{ github.run_number }}
          path: |
            # MotherDuck stores data remotely, so we don't need to upload files
            # But we can upload logs
            .dlt/pipelines/*/logs/
          retention-days: 7
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: logs-${{ github.run_number }}
          path: |
            .dlt/pipelines/*/logs/
          retention-days: 3
